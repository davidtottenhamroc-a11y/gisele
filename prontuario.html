<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prontuário Médico - Prefeitura de Mamanguape</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Times New Roman', Times, serif;
        }

        .sheet {
            max-width: 1300px;
            width: 100%;
            background: white;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 8px 12px 12px 12px;
        }

        .toolbar {
            background: #f1f5f9;
            padding: 8px 15px;
            border-radius: 50px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #cbd5e1;
            font-family: 'Segoe UI', system-ui;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            background: white;
            border: 1px solid #1e3a5f;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .btn-primary {
            background: #1e3a5f;
            color: white;
        }
        .btn-primary:hover {
            background: #0f2c44;
        }
        select {
            background: white;
            border: 1px solid #94a3b8;
            padding: 5px 10px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .documento {
            font-family: 'Times New Roman', Times, serif;
        }

        .header-via {
            text-align: center;
            margin-bottom: 6px;
            border-bottom: 1px solid #0b3b2f;
            padding-bottom: 4px;
        }
        .logo-area-via {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 3px;
        }
        .logo-img-via {
            max-height: 40px;
            max-width: 55px;
            object-fit: contain;
        }
        .placeholder-logo-via {
            width: 40px;
            height: 40px;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
        }
        .pref-text-via {
            line-height: 1.1;
        }
        .pref-name-via {
            font-size: 0.7rem;
            font-weight: bold;
        }
        .secretaria-via {
            font-size: 0.6rem;
            font-weight: 600;
        }
        .cnpj-via {
            font-size: 0.5rem;
            color: #2d3e50;
        }
        .unidade-via {
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 3px;
            text-transform: uppercase;
            background: #fef3c7;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .doc-title-via {
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            margin: 4px 0 6px 0;
            text-transform: uppercase;
        }

        .two-ways {
            display: flex;
            gap: 12px;
            flex-wrap: nowrap;
            margin: 4px 0;
        }
        .way {
            flex: 1;
            min-width: 0;
            border: 1px solid #a3b8d4;
            background: #ffffff;
            padding: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .way-title {
            background: #e9edf2;
            text-align: center;
            font-weight: bold;
            padding: 4px;
            margin-bottom: 6px;
            font-size: 0.7rem;
            border-bottom: 1px solid #b9c8e0;
        }

        .single-way-horizontal {
            border: 1px solid #a3b8d4;
            background: #ffffff;
            padding: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 27cm;
        }

        .single-way {
            border: 1px solid #a3b8d4;
            background: #ffffff;
            padding: 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            min-height: 27cm;
        }

        .campo {
            margin-bottom: 5px;
        }
        .campo label {
            font-weight: 700;
            display: block;
            font-size: 9pt;
            margin-bottom: 2px;
        }
        .campo-inline {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .campo-inline .campo {
            flex: 1;
            margin-bottom: 0;
        }
        input, select {
            width: 100%;
            padding: 4px 6px;
            border: 1px solid #8f9eb2;
            font-family: 'Times New Roman', Times, serif;
            font-size: 9pt;
            font-weight: bold;
            background: #fff;
            border-radius: 3px;
        }
        
        textarea {
            width: 100%;
            padding: 4px 6px;
            border: 1px solid #8f9eb2;
            font-family: 'Times New Roman', Times, serif;
            font-size: 9pt;
            font-weight: bold;
            background: #fff;
            border-radius: 3px;
            resize: vertical;
            min-height: 40px;
            overflow-y: auto;
        }

        /* RECEITUÁRIO SIMPLES (MODELO 1) */
        .receita-simples-modelo {
            font-family: 'Times New Roman', Times, serif;
        }
        .receita-simples-modelo .paciente-linha {
            margin: 15px 0;
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }
        .receita-simples-modelo .paciente-linha label {
            font-weight: bold;
            font-size: 10pt;
        }
        .receita-simples-modelo .paciente-linha input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 5px 0;
            font-size: 10pt;
            font-weight: bold;
            background: transparent;
        }
        .receita-simples-modelo .medicamento {
            margin: 15px 0;
            font-size: 10pt;
            line-height: 1.5;
        }
        .receita-simples-modelo .medicamento p {
            margin-bottom: 8px;
        }
        .receita-simples-modelo .medicamento .med-item {
            margin-left: 10px;
        }
        .receita-simples-modelo .assinatura {
            margin-top: 30px;
            text-align: left;
        }
        .receita-simples-modelo .assinatura .linha {
            width: 200px;
            border-bottom: 1px solid #000;
            margin: 10px 0;
        }
        .receita-simples-modelo .data {
            margin: 15px 0;
        }
        .receita-simples-modelo .data input {
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 4px 0;
            font-size: 10pt;
            font-weight: bold;
            background: transparent;
            width: auto;
            min-width: 200px;
        }
        .receita-simples-modelo .rodape {
            margin-top: 25px;
            text-align: center;
            font-size: 7pt;
            border-top: 1px solid #ccc;
            padding-top: 8px;
        }

        /* RECEITUÁRIO DE CONTROLE ESPECIAL (MODELO 2) e AZITROMICINA */
        .receita-controle-modelo, .receita-azitromicina-modelo {
            font-family: 'Times New Roman', Times, serif;
        }
        .receita-controle-modelo .way, .receita-azitromicina-modelo .way {
            padding: 8px;
        }
        .receita-controle-modelo .paciente-linha, .receita-azitromicina-modelo .paciente-linha {
            margin: 8px 0;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .receita-controle-modelo .paciente-linha label, .receita-azitromicina-modelo .paciente-linha label {
            font-weight: bold;
            font-size: 9pt;
        }
        .receita-controle-modelo .paciente-linha input, .receita-azitromicina-modelo .paciente-linha input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 3px 0;
            font-size: 9pt;
            font-weight: bold;
            background: transparent;
        }
        .receita-controle-modelo .medicamento, .receita-azitromicina-modelo .medicamento {
            margin: 10px 0;
            font-size: 9pt;
            line-height: 1.4;
        }
        .receita-controle-modelo .medicamento p, .receita-azitromicina-modelo .medicamento p {
            margin-bottom: 5px;
        }
        .receita-controle-modelo .assinatura, .receita-azitromicina-modelo .assinatura {
            margin-top: 15px;
            text-align: left;
        }
        .receita-controle-modelo .assinatura .linha, .receita-azitromicina-modelo .assinatura .linha {
            width: 180px;
            border-bottom: 1px solid #000;
            margin: 5px 0;
        }
        .receita-controle-modelo .data input, .receita-azitromicina-modelo .data input {
            display: inline-block;
            width: auto;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 9pt;
            font-weight: bold;
            background: transparent;
        }
        .receita-controle-modelo .identificacao, .receita-azitromicina-modelo .identificacao {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .receita-controle-modelo .identificacao .card, .receita-azitromicina-modelo .identificacao .card {
            flex: 1;
            border: 1px solid #ccc;
            padding: 5px;
        }
        .receita-controle-modelo .identificacao .card-title, .receita-azitromicina-modelo .identificacao .card-title {
            font-weight: bold;
            text-align: center;
            background: #eef2fa;
            padding: 3px;
            margin-bottom: 5px;
            font-size: 8pt;
        }

        /* RECEITA TIAMINA 300mg - VERTICAL (A4 RETRATO) */
        .receita-tiamina-modelo {
            font-family: 'Times New Roman', Times, serif;
            max-width: 800px;
            margin: 0 auto;
            min-height: 27cm;
            display: flex;
            flex-direction: column;
            border: 1px solid #a3b8d4;
            background: #ffffff;
            padding: 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .receita-tiamina-modelo .header-receita {
            text-align: center;
            margin-bottom: 15px;
        }
        .receita-tiamina-modelo .paciente-linha {
            margin: 15px 0;
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }
        .receita-tiamina-modelo .paciente-linha label {
            font-weight: bold;
            font-size: 10pt;
        }
        .receita-tiamina-modelo .paciente-linha input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 5px 0;
            font-size: 10pt;
            font-weight: bold;
            background: transparent;
        }
        .receita-tiamina-modelo .uso-oral {
            font-weight: bold;
            margin: 10px 0 5px 0;
            font-size: 10pt;
        }
        .receita-tiamina-modelo .medicamento {
            margin: 20px 0;
            font-size: 10pt;
            line-height: 1.6;
        }
        .receita-tiamina-modelo .medicamento p {
            margin-bottom: 8px;
        }
        .receita-tiamina-modelo .medicamento .med-item {
            margin-left: 10px;
        }
        .receita-tiamina-modelo .assinatura {
            margin-top: auto;
            text-align: left;
            padding-top: 40px;
        }
        .receita-tiamina-modelo .assinatura .linha {
            width: 200px;
            border-bottom: 1px solid #000;
            margin: 10px 0;
        }
        .receita-tiamina-modelo .data {
            margin: 15px 0;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .receita-tiamina-modelo .data input {
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 4px 0;
            font-size: 10pt;
            font-weight: bold;
            background: transparent;
            width: auto;
        }
        .receita-tiamina-modelo .rodape {
            margin-top: 25px;
            text-align: center;
            font-size: 7pt;
            border-top: 1px solid #ccc;
            padding-top: 8px;
        }
        .receita-tiamina-modelo .carimbo-area {
            margin-top: 30px;
            text-align: center;
        }
        .receita-tiamina-modelo .carimbo-area .linha-carimbo {
            width: 250px;
            border-bottom: 1px solid #000;
            margin: 10px auto;
        }

        /* GRADE DE EXAMES */
        .exames-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px 6px;
            margin: 6px 0;
            background: #fefcf5;
            padding: 6px;
            border: 1px solid #e2e8f0;
            font-size: 7.5pt;
            max-height: 200px;
            overflow-y: auto;
        }
        .exames-grid label {
            display: flex;
            align-items: center;
            gap: 3px;
            font-weight: bold;
            cursor: pointer;
            font-size: 7.5pt;
        }
        .exames-grid input[type="checkbox"] {
            width: 11px;
            height: 11px;
            margin: 0;
            flex-shrink: 0;
        }

        .presc-table {
            width: 100%;
            border-collapse: collapse;
            margin: 5px 0;
        }
        .presc-table th, .presc-table td {
            border: 1px solid #1f2e44;
            padding: 4px;
            vertical-align: top;
            font-size: 8pt;
        }
        .presc-table th {
            background: #eef2f5;
            font-weight: bold;
        }

        .assinatura-container {
            margin-top: auto;
            padding-top: 15px;
        }
        .assinatura-container .print-hide-text {
            font-size: 9pt;
            font-weight: bold;
            text-align: center;
        }
        .assinatura-container .print-show-line {
            text-align: center;
            margin-top: 3px;
            display: inline-block;
            width: 60%;
            border-bottom: 1px solid #000;
        }
        .print-show-line {
            display: none;
        }

        .emitente-box {
            background: #f9fafb;
            border: 1px solid #cbd5e1;
            padding: 5px;
            margin-bottom: 8px;
            text-align: center;
        }
        .emitente-box h4 {
            font-size: 8pt;
            margin-bottom: 2px;
            font-weight: bold;
        }

        .comprador-fornecedor {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .card-comprador, .card-fornecedor {
            flex: 1;
            border: 1px solid #b9c8e0;
            padding: 5px;
            background: #fefefe;
        }
        .card-title {
            background: #eef2fa;
            padding: 3px;
            margin-bottom: 5px;
            font-size: 8pt;
            font-weight: bold;
            text-align: center;
        }

        .radio-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 3px;
            font-weight: bold;
            font-size: 8pt;
        }

        /* ATESTADO MÉDICO */
        .atestado-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            font-size: 10pt;
            line-height: 1.6;
        }
        .atestado-content p {
            margin-bottom: 10px;
        }
        .atestado-content .campo-linha {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .atestado-content .campo-linha input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 4px 0;
            font-size: 10pt;
            font-weight: bold;
            background: transparent;
        }
        .atestado-content .campo-inline {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .atestado-rodape {
            margin-top: 25px;
            text-align: center;
            font-size: 8pt;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }

        /* EVOLUÇÃO CLÍNICA */
        .evolucao-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .evolucao-content .campo-evolucao {
            display: flex;
            flex-direction: column;
            margin-bottom: 5px;
            flex: 1;
        }
        .evolucao-content .campo-evolucao textarea {
            flex: 1;
            min-height: 220px;
        }

        /* LAUDO MÉDICO */
        .laudo-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .laudo-content .campo-descricao {
            display: flex;
            flex-direction: column;
            margin-bottom: 5px;
            flex: 1;
        }
        .laudo-content .campo-descricao textarea {
            flex: 1;
            min-height: 200px;
        }

        /* RECEITUÁRIO PADRÃO */
        .receita-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .receita-content .campo-medicamento {
            display: flex;
            flex-direction: column;
            margin-bottom: 5px;
            flex: 1;
        }
        .receita-content .campo-medicamento textarea {
            flex: 1;
            min-height: 160px;
        }

        /* NICOTINA */
        .receita-nicotina .way {
            padding: 6px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .receita-nicotina .paciente-linha {
            margin: 8px 0;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .receita-nicotina .paciente-linha label {
            font-weight: bold;
            font-size: 10pt;
        }
        .receita-nicotina .paciente-linha input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 4px 0;
            font-size: 10pt;
            font-weight: bold;
            background: transparent;
        }
        .receita-nicotina .medicamento {
            margin: 10px 0;
            font-size: 10pt;
            line-height: 1.4;
        }
        .receita-nicotina .orientacoes {
            margin: 10px 0;
            padding-left: 12px;
            flex: 1;
        }
        .receita-nicotina .assinatura {
            margin-top: auto;
            text-align: left;
            padding-top: 10px;
        }
        .receita-nicotina .assinatura .linha {
            width: 160px;
            border-bottom: 1px solid #000;
            margin: 6px 0;
        }
        .receita-nicotina .data input {
            display: inline-block;
            width: auto;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 3px 0;
            font-size: 10pt;
            font-weight: bold;
            background: transparent;
        }
        .receita-nicotina .rodape {
            margin-top: 12px;
            text-align: center;
            font-size: 7pt;
            border-top: 1px solid #ccc;
            padding-top: 6px;
        }

        /* MAIS VIDA */
        .maisvida-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .maisvida-header {
            text-align: center;
            margin-bottom: 15px;
        }
        .maisvida-header h1 {
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .maisvida-header h2 {
            font-size: 0.85rem;
            font-weight: normal;
            margin-top: 3px;
        }
        .maisvida-header .cnpj-maisvida {
            font-size: 0.65rem;
            color: #888;
            margin-top: 3px;
        }
        .maisvida-header h3 {
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 8px;
            text-decoration: underline;
        }
        
        .maisvida-prescricao {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }
        .maisvida-prescricao textarea {
            width: 100%;
            min-height: 280px;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 10pt;
            font-weight: bold;
            line-height: 1.5;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #e8f5e9;
            resize: vertical;
            flex: 1;
        }
        
        .maisvida-data {
            margin: 15px 0 10px 0;
            font-size: 10pt;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .maisvida-data .data-label {
            font-weight: bold;
            margin-right: 8px;
        }
        .maisvida-data input {
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 3px 0;
            font-size: 10pt;
            font-weight: bold;
            background: transparent;
            width: auto;
            min-width: 200px;
        }
        .maisvida-assinatura {
            margin: 15px 0;
            text-align: left;
            font-size: 10pt;
            margin-top: auto;
        }
        .assinatura-linha {
            width: 180px;
            border-bottom: 1px solid #000;
            margin: 8px 0;
        }
        .maisvida-endereco {
            text-align: center;
            font-size: 7.5pt;
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 8px;
            line-height: 1.4;
        }

        /* ATESTADO MAIS VIDA */
        .maisvida-atestado-campos {
            margin: 15px 0;
        }
        .maisvida-atestado-linha {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .maisvida-atestado-linha label {
            font-weight: bold;
            font-size: 10pt;

    function handlePrint() {
        const paisagem = ["prescricao", "exames", "controleEspecial", "receitaSimples", "nicotina7mg", "nicotina14mg", "nicotina21mg", "laudo", "receitaSimplesModelo", "receitaControleModelo", "azitromicinaModelo"];
        const retrato = ["tiamina300mg", "atestado", "evolucao", "maisvida", "maisvidaPrescricao", "maisvidaAtestado", "laudoProcedimento"];
        
        const style = document.createElement('style');
        if (paisagem.includes(currentDoc)) {
            style.textContent = `@page { size: A4 landscape; margin: 0.2cm; }`;
        } else {
            style.textContent = `@page { size: A4 portrait; margin: 0.3cm; }`;
        }
        document.head.appendChild(style);
        window.print();
        style.remove();
    }
