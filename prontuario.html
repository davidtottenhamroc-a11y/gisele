<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prontuário Médico - Prefeitura de Mamanguape</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Times New Roman', Times, serif;
        }

        .sheet {
            max-width: 1300px;
            width: 100%;
            background: white;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 5px 8px 8px 8px;
        }

        .toolbar {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 50px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #cbd5e1;
            font-family: 'Segoe UI', system-ui;
        }
        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn {
            background: white;
            border: 1px solid #1e3a5f;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.65rem;
            transition: 0.2s;
        }
        .btn-primary {
            background: #1e3a5f;
            color: white;
        }
        .btn-primary:hover {
            background: #0f2c44;
        }
        select {
            background: white;
            border: 1px solid #94a3b8;
            padding: 4px 8px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.65rem;
        }

        .documento {
            font-family: 'Times New Roman', Times, serif;
        }

        .header-via {
            text-align: center;
            margin-bottom: 4px;
            border-bottom: 1px solid #0b3b2f;
            padding-bottom: 2px;
        }
        .logo-area-via {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 2px;
        }
        .logo-img-via {
            max-height: 35px;
            max-width: 50px;
            object-fit: contain;
        }
        .placeholder-logo-via {
            width: 35px;
            height: 35px;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }
        .pref-text-via {
            line-height: 1;
        }
        .pref-name-via {
            font-size: 0.65rem;
            font-weight: bold;
        }
        .secretaria-via {
            font-size: 0.55rem;
            font-weight: 600;
        }
        .cnpj-via {
            font-size: 0.45rem;
            color: #2d3e50;
        }
        .unidade-via {
            font-size: 0.65rem;
            font-weight: bold;
            margin-top: 2px;
            text-transform: uppercase;
            background: #fef3c7;
            display: inline-block;
            padding: 1px 6px;
            border-radius: 15px;
        }

        .doc-title-via {
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            margin: 2px 0 3px 0;
            text-transform: uppercase;
        }

        .two-ways {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
            margin: 2px 0;
        }
        .way {
            flex: 1;
            min-width: 0;

            background: #ffffff;
            padding: 5px;

            flex-direction: column;
        }
        .way-title {

            font-weight: bold;

            flex-direction: column;

        .single-way {

        }

            font-weight: bold;

            background: #fefcf5;
            padding: 3px;
            border: 1px solid #e2e8f0;
            font-size: 6.5pt;

        .exames-grid input[type="checkbox"] {

            height: 9px;
            margin: 0;
            flex-shrink: 0;
        }

        .presc-table {

        .presc-table th, .presc-table td {

        }
        .assinatura-container .print-hide-text {

            font-weight: bold;
            text-align: center;
        }
        .assinatura-container .print-show-line {
            text-align: center;
            margin-top: 2px;
            display: inline-block;
            width: 60%;

        .print-show-line {

        .emitente-box {
            background: #f9fafb;
            border: 1px solid #cbd5e1;

            margin-bottom: 4px;

        .comprador-fornecedor {

        .card-comprador, .card-fornecedor {

            margin-bottom: 3px;

        }

            align-items: center;

        /* ATESTADO MÉDICO */
        .atestado-content {

            line-height: 1.6;

        .atestado-content p {

        .atestado-content .campo-linha {
            display: flex;

            flex-wrap: wrap;

        }
        .atestado-content .campo-linha label {

        .atestado-content .campo-linha input {

        .atestado-content .campo-inline {

            gap: 10px;
            flex-wrap: wrap;

        }
        .atestado-content .campo-inline .campo {

        }
        .atestado-content .campo-inline input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 10pt;
            font-weight: bold;
            background: transparent;

        .atestado-rodape {

        /* EVOLUÇÃO CLÍNICA */
        .evolucao-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .evolucao-content .campo-evolucao {
            display: flex;
            flex-direction: column;
            margin-bottom: 3px;
            flex: 1;
        }
        .evolucao-content .campo-evolucao textarea {
            flex: 1;
            min-height: 200px;
        }

        /* LAUDO MÉDICO */
        .laudo-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .laudo-content .campo-descricao {
            display: flex;
            flex-direction: column;
            margin-bottom: 3px;
            flex: 1;
        }
        .laudo-content .campo-descricao textarea {
            flex: 1;
            min-height: 200px;
        }

        /* RECEITUÁRIO */
        .receita-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .receita-content .campo-medicamento {
            display: flex;
            flex-direction: column;
            margin-bottom: 3px;
            flex: 1;
        }
        .receita-content .campo-medicamento textarea {
            flex: 1;
            min-height: 150px;
        }

        /* NICOTINA */
        .receita-nicotina .way {
            padding: 5px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .receita-nicotina .paciente-linha {
            margin: 6px 0;
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }
        .receita-nicotina .paciente-linha label {
            font-weight: bold;
            font-size: 9pt;
        }
        .receita-nicotina .paciente-linha input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 9pt;
            font-weight: bold;
            background: transparent;
        }
        .receita-nicotina .medicamento {
            margin: 6px 0;
            font-size: 9pt;
            line-height: 1.3;
        }
        .receita-nicotina .orientacoes {
            margin: 6px 0;
            padding-left: 10px;
            flex: 1;
        }
        .receita-nicotina .orientacoes p {
            margin-bottom: 2px;
        }
        .receita-nicotina .assinatura {
            margin-top: auto;
            text-align: left;
            padding-top: 8px;
        }
        .receita-nicotina .assinatura .linha {
            width: 150px;
            border-bottom: 1px solid #000;
            margin: 4px 0;
        }
        .receita-nicotina .data input {
            display: inline-block;
            width: auto;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 9pt;
            font-weight: bold;
            background: transparent;
        }
        .receita-nicotina .rodape {
            margin-top: 10px;
            text-align: center;
            font-size: 6.5pt;
            border-top: 1px solid #ccc;
            padding-top: 4px;
        }

        /* Mais Vida */
        .maisvida-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .maisvida-header {
            text-align: center;
            margin-bottom: 12px;
        }
        .maisvida-header h1 {
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .maisvida-header h2 {
            font-size: 0.8rem;
            font-weight: normal;
            margin-top: 3px;
        }
        .maisvida-header .cnpj-maisvida {
            font-size: 0.65rem;
            color: #888;
            margin-top: 2px;
        }
        .maisvida-header h3 {
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 6px;
            text-decoration: underline;
        }
        
        .maisvida-prescricao {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }
        .maisvida-prescricao textarea {
            width: 100%;
            min-height: 250px;
            padding: 6px;
            font-family: 'Courier New', monospace;
            font-size: 9pt;
            font-weight: bold;
            line-height: 1.4;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #e8f5e9;
            resize: vertical;
            flex: 1;
        }
        
        .maisvida-data {
            margin: 12px 0 8px 0;
            font-size: 9pt;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .maisvida-data .data-label {
            font-weight: bold;
            margin-right: 8px;
        }
        .maisvida-data input {
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 9pt;
            font-weight: bold;
            background: transparent;
            width: auto;
            min-width: 200px;
        }
        .maisvida-assinatura {
            margin: 12px 0;
            text-align: left;
            font-size: 9pt;
            margin-top: auto;
        }
        .assinatura-linha {
            width: 180px;
            border-bottom: 1px solid #000;
            margin: 6px 0;
        }
        .maisvida-endereco {
            text-align: center;
            font-size: 6.5pt;
            margin-top: 15px;
            border-top: 1px solid #ccc;
            padding-top: 6px;
            line-height: 1.3;
        }

        /* Atestado Mais Vida */
        .maisvida-atestado-campos {
            margin: 15px 0;
        }
        .maisvida-atestado-linha {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .maisvida-atestado-linha label {
            font-weight: bold;
            font-size: 10pt;
            min-width: 140px;
        }
        .maisvida-atestado-linha input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 4px 0;
            font-size: 10pt;
            font-weight: bold;
            background: transparent;
        }
        .maisvida-atestado-linha .dias-input {
            max-width: 80px;
            text-align: center;
        }
        .maisvida-atestado-linha .cid-input {
            max-width: 150px;
        }

        /* Laudo Procedimento */
        .laudo-procedimento {
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            min-height: 27cm;
        }
        .laudo-procedimento .secao {
            margin-bottom: 6px;
            border: 1px solid #ccc;
            padding: 4px;
            background: #fefefe;

        .laudo-procedimento .secao-titulo {
            font-weight: bold;
            font-size: 8pt;
            margin-bottom: 4px;
            background: #e9ecef;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .laudo-procedimento .campo-linha {
            margin-bottom: 3px;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .laudo-procedimento .campo-linha label {
            font-weight: bold;
            font-size: 7pt;
            min-width: 200px;
        }
        .laudo-procedimento .campo-linha input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 7pt;
            font-weight: bold;
            background: transparent;
        }
        .laudo-procedimento .campo-linha-full textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 7pt;
            font-weight: bold;
            background: transparent;
            min-height: 30px;
            max-height: 45px;
        }
        .laudo-procedimento .assinatura-area {
            margin-top: auto;
            text-align: center;
            padding-top: 15px;
        }
        .laudo-procedimento .data-area {
            margin-top: 6px;
            text-align: right;
        }
        .laudo-procedimento .data-area input {
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 7pt;
            font-weight: bold;
            background: transparent;
            width: auto;
            min-width: 180px;
            text-align: center;
        }

        @media print {
            .toolbar, .no-print, .btn-group, .btn, select, #printBtn {
                display: none !important;
            }
            .sheet {
                box-shadow: none;
                padding: 0;
                max-width: 100%;
                margin: 0;
            }
            .single-way-horizontal, .single-way, .two-ways, .way {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            input, textarea {
                border: 1px solid #aaa !important;
                background: white !important;
                font-size: 8pt !important;
            }
            .print-hide-text {
                display: none !important;
            }
            .print-show-line {
                display: block !important;
            }
            .exames-grid {
                max-height: none;
                overflow: visible;
                grid-template-columns: repeat(5, 1fr) !important;
                font-size: 6.5pt !important;
            }
            .exames-grid label {
                font-size: 6.5pt !important;
                white-space: normal !important;
                line-height: 1.2;
            }
            .evolucao-content .campo-evolucao textarea {
                min-height: 200px !important;
            }
            .laudo-content .campo-descricao textarea {
                min-height: 200px !important;
            }
            .receita-nicotina .orientacoes {
                min-height: 150px !important;
            }
        }
    </style>
</head>
<body>
<div class="sheet">
    <div class="toolbar no-print">
        <div class="btn-group">
            <select id="unidadeSelect">
                <option value="AME">AMBULATÓRIO DE ESPECIALIDADES - AME</option>
                <option value="CAPS">CAPS AD III REGIONAL VALE DO MAMANGUAPE</option>
                <option value="MAISVIDA">MAIS VIDA - SERVIÇOS MÉDICOS</option>
            </select>
            <select id="docSelector">
                <option value="controleEspecial">📋 Controle Especial</option>
                <option value="prescricao">💊 Prescrição Médica</option>
                <option value="receitaSimples">📄 Receituário</option>
                <option value="laudo">📑 Laudo Médico</option>
                <option value="exames">🔬 Solicitação de Exames</option>
                <option value="evolucao">📝 Evolução Clínica</option>
                <option value="atestado">📋 Atestado Médico</option>
                <option value="maisvida">🏥 Mais Vida - Receituário Médico</option>
                <option value="maisvidaPrescricao">🏥 Mais Vida - Solicitação de Exames</option>
                <option value="maisvidaAtestado">📋 Mais Vida - Atestado Médico</option>
                <option value="nicotina7mg">🚬 Nicotina Adesivo 7mg</option>
                <option value="nicotina14mg">🚬 Nicotina Adesivo 14mg</option>
                <option value="nicotina21mg">🚬 Nicotina Adesivo 21mg</option>
                <option value="laudoProcedimento">📄 Laudo para Solicitação de Procedimento</option>
            </select>
            <button id="printBtn" class="btn btn-primary">🖨️ IMPRIMIR</button>
        </div>
    </div>
    <div id="documentoRender" class="documento"></div>
</div>

<script>
    let currentDoc = "exames";
    let currentUnidade = "CAPS";

    const docContainer = document.getElementById("documentoRender");
    const unidadeSelect = document.getElementById("unidadeSelect");
    const docSelector = document.getElementById("docSelector");
    const printBtn = document.getElementById("printBtn");

    const CNPJ_MAISVIDA = "40.132.734/0001-49";

    // LISTA COMPLETA DE EXAMES
    const examesCompletos = [
        "Hemograma", "Coagulograma", "Tipagem Sanguínea", "Sódio e Potássio", "Ureia", "Creatinina",
        "Glicemia de Jejum", "Teste de Tolerância a Glicose", "Hemoglobina Glicada", "Colesterol Total e Frações",
        "Triglicerídios", "CPK", "Gama GT", "Bilirrubinas Total e Frações", "TGO / TGP", "Amilase / Lipase",
        "Fosfatase Alcalina", "Proteinas Totais e Frações", "Ferro, Ferritina e Transferrina", "Cálcio Total",

    function getDataAtual() {

        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const ano = hoje.getFullYear();
        const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
        return {
            dataNumerica: `${dia}/${mes}/${ano}`,
            dataExtenso: `${dia} de ${meses[hoje.getMonth()]} de ${ano}`,
            dia: parseInt(dia),
            mesExtenso: meses[hoje.getMonth()],

    function renderizar() {
        switch(currentDoc) {
            case "controleEspecial": renderControleEspecial(); break;
            case "prescricao": renderPrescricao(); break;
            case "receitaSimples": renderReceitaSimples(); break;
            case "laudo": renderLaudo(); break;
            case "exames": renderSolicitacaoExames(); break;
            case "evolucao": renderEvolucao(); break;
            case "atestado": renderAtestado(); break;
            case "maisvida": renderMaisVida(); break;
            case "maisvidaPrescricao": renderMaisVidaPrescricao(); break;
            case "maisvidaAtestado": renderMaisVidaAtestado(); break;
            case "nicotina7mg": renderNicotina7mg(); break;
            case "nicotina14mg": renderNicotina14mg(); break;
            case "nicotina21mg": renderNicotina21mg(); break;
            case "laudoProcedimento": renderLaudoProcedimento(); break;
            default: renderSolicitacaoExames();
        }
    }

    function handlePrint() {
        const paisagem = ["prescricao", "exames", "controleEspecial", "receitaSimples", "nicotina7mg", "nicotina14mg", "nicotina21mg", "laudo"];
        const style = document.createElement('style');
        if (paisagem.includes(currentDoc)) {
            style.textContent = `@page { size: A4 landscape; margin: 0.15cm; }`;
        } else {
            style.textContent = `@page { size: A4 portrait; margin: 0.3cm; }`;
        }
        document.head.appendChild(style);
        window.print();
        style.remove();
    }

    unidadeSelect.addEventListener("change", () => { currentUnidade = unidadeSelect.value; renderizar(); });
    docSelector.addEventListener("change", () => { currentDoc = docSelector.value; renderizar(); });
    printBtn.addEventListener("click", handlePrint);
    
    renderizar();
</script>
