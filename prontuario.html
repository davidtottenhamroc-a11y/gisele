<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prontuário Médico - Prefeitura de Mamanguape</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Times New Roman', Times, serif;
        }

        .sheet {
            max-width: 1300px;
            width: 100%;
            background: white;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 10px 12px 12px 12px;
        }

        .toolbar {
            background: #f1f5f9;
            padding: 8px 15px;
            border-radius: 50px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #cbd5e1;
            font-family: 'Segoe UI', system-ui;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            background: white;
            border: 1px solid #1e3a5f;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .btn-primary {
            background: #1e3a5f;
            color: white;
        }
        .btn-primary:hover {
            background: #0f2c44;
        }
        select {
            background: white;
            border: 1px solid #94a3b8;
            padding: 5px 10px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .documento {
            font-family: 'Times New Roman', Times, serif;
        }

        .header-via {
            text-align: center;
            margin-bottom: 5px;
            border-bottom: 1px solid #0b3b2f;
            padding-bottom: 3px;
        }
        .logo-area-via {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 2px;
        }
        .logo-img-via {
            max-height: 40px;
            max-width: 60px;
            object-fit: contain;
        }
        .placeholder-logo-via {
            width: 40px;
            height: 40px;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
        }
        .pref-text-via {
            line-height: 1.1;
        }
        .pref-name-via {
            font-size: 0.7rem;
            font-weight: bold;
        }
        .secretaria-via {
            font-size: 0.6rem;
            font-weight: 600;
        }
        .cnpj-via {
            font-size: 0.5rem;
            color: #2d3e50;
        }
        .unidade-via {
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 2px;
            text-transform: uppercase;
            background: #fef3c7;
            display: inline-block;
            padding: 1px 8px;
            border-radius: 20px;
        }

        .doc-title-via {
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            margin: 3px 0 5px 0;
            text-transform: uppercase;
        }

        /* Layout para 2 vias */
        .two-ways {
            display: flex;
            gap: 12px;
            flex-wrap: nowrap;
            margin: 3px 0;
        }
        .way {
            flex: 1;
            min-width: 0;
            border: 1px solid #a3b8d4;
            background: #ffffff;
            padding: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .way-title {
            background: #e9edf2;
            text-align: center;
            font-weight: bold;
            padding: 3px;
            margin-bottom: 5px;
            font-size: 0.65rem;
            border-bottom: 1px solid #b9c8e0;
        }

        /* Layout para 1 via (horizontal) */
        .single-way-horizontal {
            border: 1px solid #a3b8d4;
            background: #ffffff;
            padding: 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* Layout para 1 via vertical */
        .single-way {
            border: 1px solid #a3b8d4;
            background: #ffffff;
            padding: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
        }

        .campo {
            margin-bottom: 4px;
        }
        .campo label {
            font-weight: 700;
            display: block;
            font-size: 0.55rem;
            margin-bottom: 1px;
        }
        .campo-inline {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .campo-inline .campo {
            flex: 1;
            margin-bottom: 0;
        }
        input, select {
            width: 100%;
            padding: 3px 4px;
            border: 1px solid #8f9eb2;
            font-family: 'Times New Roman', Times, serif;
            font-size: 12pt;
            font-weight: bold;
            background: #fff;
            border-radius: 3px;
        }
        
        textarea {
            width: 100%;
            padding: 3px 4px;
            border: 1px solid #8f9eb2;
            font-family: 'Times New Roman', Times, serif;
            font-size: 12pt;
            font-weight: bold;
            background: #fff;
            border-radius: 3px;
            resize: vertical;
            min-height: 60px;
            max-height: 400px;
            overflow-y: auto;
        }

        .exames-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px 6px;
            margin: 5px 0;
            background: #fefcf5;
            padding: 4px;
            border: 1px solid #e2e8f0;
            font-size: 0.55rem;
        }
        .exames-grid label {
            display: flex;
            align-items: center;
            gap: 3px;
            font-weight: normal;
            cursor: pointer;
            font-size: 0.55rem;
        }
        .exames-grid input[type="checkbox"] {
            width: 10px;
            height: 10px;
            margin: 0;
            flex-shrink: 0;
        }

        .presc-table {
            width: 100%;
            border-collapse: collapse;
            margin: 4px 0;
        }
        .presc-table th, .presc-table td {
            border: 1px solid #1f2e44;
            padding: 3px;
            vertical-align: top;
            font-size: 0.55rem;
        }
        .presc-table th {
            background: #eef2f5;
        }
        .presc-table textarea {
            font-size: 10pt;
            font-weight: bold;
            padding: 2px;
            min-height: 35px;
            max-height: 100px;
        }

        .assinatura-container {
            margin-top: 6px;
        }
        .assinatura-container .print-hide-text {
            font-size: 0.55rem;
            font-weight: bold;
            text-align: center;
        }
        .assinatura-container .print-show-line {
            text-align: center;
            margin-top: 3px;
        }
        .assinatura-container .print-show-line div {
            display: inline-block;
            width: 80%;
            border-bottom: 1px solid #000;
        }
        .print-show-line {
            display: none;
        }

        .emitente-box {
            background: #f9fafb;
            border: 1px solid #cbd5e1;
            padding: 4px;
            margin-bottom: 6px;
            text-align: center;
        }
        .emitente-box h4 {
            font-size: 0.55rem;
            margin-bottom: 2px;
        }
        .emitente-box div {
            font-size: 0.5rem;
        }

        .comprador-fornecedor {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .card-comprador, .card-fornecedor {
            flex: 1;
            border: 1px solid #b9c8e0;
            padding: 4px;
            background: #fefefe;
        }
        .card-title {
            background: #eef2fa;
            padding: 2px;
            margin-bottom: 4px;
            font-size: 0.55rem;
            font-weight: bold;
            text-align: center;
        }
        .card-comprador input, .card-fornecedor input {
            font-size: 10pt;
            font-weight: bold;
        }

        .radio-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 2px;
            font-weight: normal;
            font-size: 0.55rem;
        }

        /* Estilos para Mais Vida */
        .maisvida-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .maisvida-content {
            font-family: 'Times New Roman', Times, serif;
        }
        .maisvida-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .maisvida-header h1 {
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .maisvida-header h2 {
            font-size: 1rem;
            font-weight: normal;
            margin-top: 5px;
        }
        .maisvida-header h3 {
            font-size: 1rem;
            font-weight: bold;
            margin-top: 12px;
            text-decoration: underline;
        }
        
        .maisvida-prescricao textarea {
            width: 100%;
            min-height: 350px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11pt;
            font-weight: bold;
            line-height: 1.6;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #e8f5e9;
            resize: vertical;
            max-height: 600px;
        }
        
        .maisvida-data {
            text-align: right;
            margin: 25px 0 15px 0;
            font-size: 0.9rem;
        }
        .maisvida-assinatura {
            margin: 20px 0;
            text-align: left;
            font-size: 0.9rem;
        }
        .maisvida-assinatura p {
            margin-bottom: 5px;
        }
        .assinatura-linha {
            width: 250px;
            border-bottom: 1px solid #000;
            margin: 10px 0;
        }
        .maisvida-endereco {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 30px;
            border-top: 1px solid #ccc;
            padding-top: 12px;
            line-height: 1.4;
        }
        .maisvida-content input {
            font-size: 12pt;
            font-weight: bold;
        }

        /* Estilos para as receitas de Nicotina (2 vias) */
        .receita-nicotina {
            font-family: 'Times New Roman', Times, serif;
            font-size: 11pt;
        }
        .receita-nicotina .header-receita {
            text-align: center;
            margin-bottom: 10px;
        }
        .receita-nicotina .header-receita h1 {
            font-size: 11pt;
            font-weight: bold;
            text-transform: uppercase;
        }
        .receita-nicotina .header-receita h2 {
            font-size: 10pt;
            font-weight: normal;
        }
        .receita-nicotina .header-receita h3 {
            font-size: 11pt;
            font-weight: bold;
            margin-top: 5px;
            text-transform: uppercase;
        }
        .receita-nicotina .paciente-linha {
            margin: 10px 0;
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }
        .receita-nicotina .paciente-linha label {
            font-weight: bold;
            font-size: 11pt;
        }
        .receita-nicotina .paciente-linha input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 5px 0;
            font-size: 12pt;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif;
            background: transparent;
        }
        .receita-nicotina .medicamento {
            margin: 15px 0;
            font-size: 11pt;
            line-height: 1.4;
        }
        .receita-nicotina .medicamento p {
            margin-bottom: 5px;
        }
        .receita-nicotina .orientacoes {
            margin: 15px 0;
            padding-left: 15px;
        }
        .receita-nicotina .orientacoes p {
            margin-bottom: 3px;
        }
        .receita-nicotina .assinatura {
            margin-top: 20px;
            text-align: left;
        }
        .receita-nicotina .assinatura .linha {
            width: 200px;
            border-bottom: 1px solid #000;
            margin: 8px 0;
        }
        .receita-nicotina .data {
            margin: 15px 0;
        }
        .receita-nicotina .rodape {
            margin-top: 20px;
            text-align: center;
            font-size: 8pt;
            border-top: 1px solid #ccc;
            padding-top: 8px;
        }

        /* IMPRESSÃO */
        @media print {
            .toolbar, .no-print, .btn-group, .btn, select, #printBtn {
                display: none !important;
            }
            .sheet {
                box-shadow: none;
                padding: 0;
                max-width: 100%;
                margin: 0;
            }
            .two-ways {
                gap: 8px;
            }
            .way {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            .single-way-horizontal {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            input, textarea {
                border: 1px solid #aaa !important;
                background: white !important;
            }
            .print-hide-text {
                display: none !important;
            }
            .print-show-line {
                display: block !important;
            }
            .exames-grid {
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 2px 4px !important;
                overflow: visible !important;
            }
            .presc-table textarea {
                min-height: 30px;
            }
            
            .receita-content .campo-medicamento textarea {
                min-height: 180px !important;
                height: auto !important;
                max-height: 220px !important;
            }
            
            .laudo-content .campo-descricao textarea {
                min-height: 180px !important;
                height: auto !important;
                max-height: 220px !important;
            }
            
            .single-way {
                min-height: 27.5cm;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
            }
            .single-way-horizontal {
                min-height: auto;
            }
            .atestado-content {
                flex: 1;
                display: flex;
                flex-direction: column;
            }
            .atestado-texto {
                flex: 1;
            }
            .maisvida-prescricao textarea {
                max-height: 450px !important;
            }
            .evolucao-content .campo-evolucao textarea {
                max-height: 350px !important;
            }
            .way .campo textarea {
                max-height: 80px !important;
            }
            
            .receita-nicotina .paciente-linha input {
                border-bottom: 1px solid #000 !important;
            }
            input, textarea {
                font-size: 12pt !important;
                font-weight: bold !important;
            }
        }
        
        .receita-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .receita-content .campo-medicamento {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 4px;
        }
        .receita-content .campo-medicamento textarea {
            flex: 1;
            min-height: 120px;
            max-height: 300px;
        }
        
        .laudo-content .campo-descricao textarea {
            min-height: 100px;
            max-height: 300px;
        }
        
        .evolucao-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .evolucao-content .campo-evolucao textarea {
            min-height: 200px;
            max-height: 500px;
        }
        
        .way .campo textarea {
            min-height: 50px;
            max-height: 150px;
        }
    </style>
</head>
<body>
<div class="sheet">
    <div class="toolbar no-print">
        <div class="btn-group">
            <select id="unidadeSelect">
                <option value="AME">AMBULATÓRIO DE ESPECIALIDADES - AME</option>
                <option value="CAPS">CAPS AD III REGIONAL VALE DO MAMANGUAPE</option>
                <option value="MAISVIDA">MAIS VIDA - SERVIÇOS MÉDICOS</option>
            </select>
            <select id="docSelector">
                <option value="controleEspecial">📋 Controle Especial</option>
                <option value="prescricao">💊 Prescrição Médica</option>
                <option value="receitaSimples">📄 Receita Simples</option>
                <option value="laudo">📑 Laudo Médico</option>
                <option value="exames">🔬 Solicitação de Exames</option>
                <option value="evolucao">📝 Evolução Clínica</option>
                <option value="atestado">📋 Atestado Médico</option>
                <option value="maisvida">🏥 Mais Vida - Receituário</option>
                <option value="maisvidaPrescricao">🏥 Mais Vida - Prescrição Médica</option>
                <option value="maisvidaAtestado">📋 Mais Vida - Atestado Médico</option>
                <option value="nicotina7mg">🚬 Nicotina Adesivo 7mg</option>
                <option value="nicotina14mg">🚬 Nicotina Adesivo 14mg</option>
                <option value="nicotina21mg">🚬 Nicotina Adesivo 21mg</option>
            </select>
            <button id="printBtn" class="btn btn-primary">🖨️ IMPRIMIR</button>
        </div>
    </div>
    <div id="documentoRender" class="documento"></div>
</div>

<script>
    let currentDoc = "prescricao";
    let currentUnidade = "AME";

    const docContainer = document.getElementById("documentoRender");
    const unidadeSelect = document.getElementById("unidadeSelect");
    const docSelector = document.getElementById("docSelector");
    const printBtn = document.getElementById("printBtn");

    function getDataAtual() {
        const hoje = new Date();
        const dia = String(hoje.getDate()).padStart(2, '0');
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const ano = hoje.getFullYear();
        const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
        return {
            dataNumerica: `${dia}/${mes}/${ano}`,
            dia: parseInt(dia),
            mesExtenso: meses[hoje.getMonth()],
            mesNumero: mes,
            ano: ano,
            cidade: "JOÃO PESSOA"
        };
    }

    function getAssinaturaComponent(texto) {
        return `
            <div class="assinatura-container">
                <div class="print-hide-text" style="font-size:0.8rem; font-weight:bold; text-align:center;">${texto}</div>
                <div class="print-show-line" style="text-align:center; margin-top:5px;">
                    <div style="display:inline-block; width:60%; border-bottom:1px solid #000;"></div>
                </div>
            </div>
        `;
    }

    function renderHeaderVia() {
        let unidadeNome = "";
        let logoSrc = "img/imagem1.png";
        
        if (currentUnidade === "AME") {
            unidadeNome = "AMBULATÓRIO DE ESPECIALIDADES - AME";
        } else if (currentUnidade === "CAPS") {
            unidadeNome = "CAPS AD III REGIONAL VALE DO MAMANGUAPE";
        } else {
            unidadeNome = "MAIS VIDA - SERVIÇOS MÉDICOS EIRELLI";
        }
        
        if (currentUnidade === "MAISVIDA") {
            return `
                <div class="header-via" style="border-bottom: none;">
                    <div class="logo-area-via">
                        <div class="pref-text-via" style="text-align: center; width: 100%;">
                            <div class="pref-name-via" style="font-size: 1rem;">MAIS VIDA</div>
                            <div class="secretaria-via" style="font-size: 0.8rem;">SERVIÇOS MÉDICOS EIRELLI</div>
                        </div>
                    </div>
                    <hr />
                </div>
            `;
        }
        
        return `
            <div class="header-via">
                <div class="logo-area-via">
                    <img src="${logoSrc}" class="logo-img-via" alt="Logo Prefeitura" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="placeholder-logo-via" style="display:none;">🏥</div>
                    <div class="pref-text-via">
                        <div class="pref-name-via">PREFEITURA MUNICIPAL DE MAMANGUAPE</div>
                        <div class="secretaria-via">SECRETARIA MUNICIPAL DE SAÚDE</div>
                        <div class="cnpj-via">CNPJ: 08.674.396/0001-64</div>
                    </div>
                </div>
                <div class="unidade-via">${unidadeNome}</div>
                <hr />
            </div>
        `;
    }

    function getEnderecoPorUnidade() {
        if (currentUnidade === "MAISVIDA") {
            return "Rua Professor Arnaldo de Berros Barro Moreira nº 193, Mangabeira - João Pessoa - PB CEP 58055-620 - Telefone (83) 98731-7608";
        } else {
            return "Rua Fábio Barbosa Vaz, Campo, Mamanguape – PB, CEP: 58.280-000 - capsad3mamanguape@outlook.com";
        }
    }

    function getNomeUnidade() {
        if (currentUnidade === "AME") {
            return "AMBULATÓRIO DE ESPECIALIDADES - AME";
        } else if (currentUnidade === "CAPS") {
            return "CAPS AD III REGIONAL VALE DO MAMANGUAPE";
        } else {
            return "MAIS VIDA - SERVIÇOS MÉDICOS EIRELLI";
        }
    }

    // ======================= RECEITA NICOTINA 7mg (2 VIAS - PAISAGEM) =======================
    function renderNicotina7mg() {
        const data = getDataAtual();
        const endereco = getEnderecoPorUnidade();
        const nomeUnidade = getNomeUnidade();
        
        const viaContent = (viaNome, suffix) => `
            <div class="way">
                <div class="header-receita">
                    <h1>PREFEITURA MUNICIPAL DE MAMANGUAPE</h1>
                    <h2>SECRETARIA MUNICIPAL DE SAÚDE</h2>
                    <h2>${nomeUnidade}</h2>
                    <h3>RECEITUÁRIO</h3>
                </div>
                <div class="way-title">${viaNome}</div>
                
                <div class="paciente-linha">
                    <label>NOME DO PACIENTE:</label>
                    <input type="text" id="paciente_nicotina7_${suffix}" placeholder="_________________________">
                </div>
                
                <div class="medicamento">
                    <p><strong>RECEITUÁRIO</strong></p>
                    <p><strong>1. Nicotina Adesivo Transdérmico 07mg</strong> ______ 30Un</p>
                    <p>Aplicar 01 adesivo pela manhã, em pele limpa e seca, trocar o local diariamente, por 04 semanas:</p>
                </div>
                
                <div class="orientacoes">
                    <p><strong>ORIENTAÇÕES:</strong></p>
                    <p>- Não fumar durante o uso do adesivo</p>
                    <p>- Retirar à noite se houver insônia ou sonhos vividos.</p>
                    <p>- Não cortar o adesivo</p>

    function renderizar() {
        switch(currentDoc) {
            case "controleEspecial": renderControleEspecial(); break;
            case "prescricao": renderPrescricao(); break;
            case "receitaSimples": renderReceitaSimples(); break;
            case "laudo": renderLaudo(); break;
            case "exames": renderSolicitacaoExames(); break;
            case "evolucao": renderEvolucao(); break;
            case "atestado": renderAtestado(); break;
            case "maisvida": renderMaisVida(); break;
            case "maisvidaPrescricao": renderMaisVidaPrescricao(); break;
            case "maisvidaAtestado": renderMaisVidaAtestado(); break;
            case "nicotina7mg": renderNicotina7mg(); break;
            case "nicotina14mg": renderNicotina14mg(); break;
            case "nicotina21mg": renderNicotina21mg(); break;
            default: renderPrescricao();
        }
    }

    // Função de impressão com orientação correta
    function handlePrint() {
        // Documentos de 1 via vertical (retrato)
        const documentosRetrato = ["evolucao", "atestado", "maisvida", "maisvidaPrescricao", "maisvidaAtestado"];
        
        if (documentosRetrato.includes(currentDoc)) {
            const style = document.createElement('style');
            style.textContent = `@page { size: A4 portrait; margin: 0.5cm; }`;
            document.head.appendChild(style);
            window.print();
            style.remove();
        } else {
            // Todos os outros (2 vias ou prescrição padrão) - paisagem
            const style = document.createElement('style');
            style.textContent = `@page { size: A4 landscape; margin: 0.3cm; }`;
            document.head.appendChild(style);
            window.print();
            style.remove();
        }
    }

    unidadeSelect.addEventListener("change", () => { currentUnidade = unidadeSelect.value; renderizar(); });
    docSelector.addEventListener("change", () => { currentDoc = docSelector.value; renderizar(); });
    printBtn.addEventListener("click", handlePrint);
    
    renderizar();
