<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prontuário Médico - Prefeitura de Mamanguape</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Times New Roman', Times, serif;
        }

        .sheet {
            max-width: 1300px;
            width: 100%;
            background: white;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 8px 10px 10px 10px;
        }

        .toolbar {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 50px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #cbd5e1;
            font-family: 'Segoe UI', system-ui;
        }
        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn {
            background: white;
            border: 1px solid #1e3a5f;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.65rem;
            transition: 0.2s;
        }
        .btn-primary {
            background: #1e3a5f;
            color: white;
        }
        .btn-primary:hover {
            background: #0f2c44;
        }
        select {
            background: white;
            border: 1px solid #94a3b8;
            padding: 4px 8px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.65rem;
        }

        .documento {
            font-family: 'Times New Roman', Times, serif;
        }

        .header-via {
            text-align: center;
            margin-bottom: 4px;
            border-bottom: 1px solid #0b3b2f;
            padding-bottom: 2px;
        }
        .logo-area-via {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 2px;
        }
        .logo-img-via {
            max-height: 35px;
            max-width: 50px;
            object-fit: contain;
        }
        .placeholder-logo-via {
            width: 35px;
            height: 35px;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }
        .pref-text-via {
            line-height: 1;
        }
        .pref-name-via {
            font-size: 0.65rem;
            font-weight: bold;
        }
        .secretaria-via {
            font-size: 0.55rem;
            font-weight: 600;
        }
        .cnpj-via {
            font-size: 0.45rem;
            color: #2d3e50;
        }
        .unidade-via {
            font-size: 0.65rem;
            font-weight: bold;
            margin-top: 2px;
            text-transform: uppercase;
            background: #fef3c7;
            display: inline-block;
            padding: 1px 6px;
            border-radius: 15px;
        }

        .doc-title-via {
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            margin: 2px 0 3px 0;
            text-transform: uppercase;
        }

        /* Layout para 2 vias */
        .two-ways {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
            margin: 2px 0;
        }
        .way {
            flex: 1;
            min-width: 0;
            border: 1px solid #a3b8d4;
            background: #ffffff;
            padding: 5px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .way-title {
            background: #e9edf2;
            text-align: center;
            font-weight: bold;
            padding: 2px;
            margin-bottom: 4px;
            font-size: 0.6rem;
            border-bottom: 1px solid #b9c8e0;
        }

        /* Layout para 1 via (horizontal) */
        .single-way-horizontal {
            border: 1px solid #a3b8d4;
            background: #ffffff;
            padding: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* Layout para 1 via vertical */
        .single-way {
            border: 1px solid #a3b8d4;
            background: #ffffff;
            padding: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
        }

        /* CAMPOS */
        .campo {
            margin-bottom: 3px;
        }
        .campo label {
            font-weight: 700;
            display: block;
            font-size: 10pt;
            margin-bottom: 1px;
        }
        .campo-inline {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }
        .campo-inline .campo {
            flex: 1;
            margin-bottom: 0;
        }
        input, select {
            width: 100%;
            padding: 2px 4px;
            border: 1px solid #8f9eb2;
            font-family: 'Times New Roman', Times, serif;
            font-size: 10pt;
            font-weight: bold;
            background: #fff;
            border-radius: 3px;
        }
        
        textarea {
            width: 100%;
            padding: 2px 4px;
            border: 1px solid #8f9eb2;
            font-family: 'Times New Roman', Times, serif;
            font-size: 10pt;
            font-weight: bold;
            background: #fff;
            border-radius: 3px;
            resize: vertical;
            min-height: 40px;
            max-height: 80px;
            overflow-y: auto;
        }

        .exames-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px 4px;
            margin: 4px 0;
            background: #fefcf5;
            padding: 3px;
            border: 1px solid #e2e8f0;
            font-size: 9pt;
        }
        .exames-grid label {
            display: flex;
            align-items: center;
            gap: 2px;
            font-weight: bold;
            cursor: pointer;
            font-size: 9pt;
        }
        .exames-grid input[type="checkbox"] {
            width: 10px;
            height: 10px;
            margin: 0;
            flex-shrink: 0;
        }

        .presc-table {
            width: 100%;
            border-collapse: collapse;
            margin: 3px 0;
        }
        .presc-table th, .presc-table td {
            border: 1px solid #1f2e44;
            padding: 2px;
            vertical-align: top;
            font-size: 9pt;
        }
        .presc-table th {
            background: #eef2f5;
            font-weight: bold;
        }
        .presc-table textarea {
            font-size: 9pt;
            font-weight: bold;
            padding: 2px;
            min-height: 25px;
            max-height: 60px;
        }
        .presc-table input {
            font-size: 9pt;
            font-weight: bold;
            padding: 2px;
            width: 100%;
        }

        .assinatura-container {
            margin-top: 5px;
        }
        .assinatura-container .print-hide-text {
            font-size: 9pt;
            font-weight: bold;
            text-align: center;
        }
        .assinatura-container .print-show-line {
            text-align: center;
            margin-top: 2px;
        }
        .assinatura-container .print-show-line div {
            display: inline-block;
            width: 60%;
            border-bottom: 1px solid #000;
        }
        .print-show-line {
            display: none;
        }

        .emitente-box {
            background: #f9fafb;
            border: 1px solid #cbd5e1;
            padding: 3px;
            margin-bottom: 4px;
            text-align: center;
        }
        .emitente-box h4 {
            font-size: 8pt;
            margin-bottom: 1px;
            font-weight: bold;
        }
        .emitente-box div {
            font-size: 7pt;
        }

        .comprador-fornecedor {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .card-comprador, .card-fornecedor {
            flex: 1;
            border: 1px solid #b9c8e0;
            padding: 3px;
            background: #fefefe;
        }
        .card-title {
            background: #eef2fa;
            padding: 2px;
            margin-bottom: 3px;
            font-size: 8pt;
            font-weight: bold;
            text-align: center;
        }
        .card-comprador input, .card-fornecedor input {
            font-size: 9pt;
            font-weight: bold;
        }

        .radio-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 2px;
            font-weight: bold;
            font-size: 9pt;
        }

        /* Estilos para Mais Vida */
        .maisvida-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .maisvida-content {
            font-family: 'Times New Roman', Times, serif;
        }
        .maisvida-header {
            text-align: center;
            margin-bottom: 12px;
        }
        .maisvida-header h1 {
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .maisvida-header h2 {
            font-size: 0.8rem;
            font-weight: normal;
            margin-top: 3px;
        }
        .maisvida-header h3 {
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 6px;
            text-decoration: underline;
        }
        
        .maisvida-prescricao textarea {
            width: 100%;
            min-height: 250px;
            padding: 6px;
            font-family: 'Courier New', monospace;
            font-size: 10pt;
            font-weight: bold;
            line-height: 1.4;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #e8f5e9;
            resize: vertical;
            max-height: 400px;
        }
        
        .maisvida-data {
            text-align: right;
            margin: 12px 0 8px 0;
            font-size: 9pt;
        }
        .maisvida-assinatura {
            margin: 12px 0;
            text-align: left;
            font-size: 9pt;
        }
        .maisvida-assinatura p {
            margin-bottom: 3px;
        }
        .assinatura-linha {
            width: 180px;
            border-bottom: 1px solid #000;
            margin: 6px 0;
        }
        .maisvida-endereco {
            text-align: center;
            font-size: 7pt;
            margin-top: 15px;
            border-top: 1px solid #ccc;
            padding-top: 6px;
            line-height: 1.3;
        }
        .maisvida-content input {
            font-size: 10pt;
            font-weight: bold;
        }

        /* Estilos para as receitas de Nicotina */
        .receita-nicotina .way {
            padding: 5px;
        }
        .receita-nicotina .paciente-linha {
            margin: 6px 0;
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }
        .receita-nicotina .paciente-linha label {
            font-weight: bold;
            font-size: 10pt;
        }
        .receita-nicotina .paciente-linha input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 10pt;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif;
            background: transparent;
        }
        .receita-nicotina .medicamento {
            margin: 8px 0;
            font-size: 10pt;
            line-height: 1.3;
        }
        .receita-nicotina .medicamento p {
            margin-bottom: 2px;
        }
        .receita-nicotina .orientacoes {
            margin: 8px 0;
            padding-left: 10px;
        }
        .receita-nicotina .orientacoes p {
            margin-bottom: 2px;
        }
        .receita-nicotina .assinatura {
            margin-top: 12px;
            text-align: left;
        }
        .receita-nicotina .assinatura .linha {
            width: 150px;
            border-bottom: 1px solid #000;
            margin: 4px 0;
        }
        .receita-nicotina .data {
            margin: 8px 0;
        }
        .receita-nicotina .data input {
            display: inline-block;
            width: auto;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 10pt;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif;
            background: transparent;
            text-align: left;
        }
        .receita-nicotina .rodape {
            margin-top: 12px;
            text-align: center;
            font-size: 7pt;
            border-top: 1px solid #ccc;
            padding-top: 5px;
        }

        /* Estilos para Laudo de Procedimento - versão compacta para 1 página */
        .laudo-procedimento {
            font-family: 'Times New Roman', Times, serif;
        }
        .laudo-procedimento .secao {
            margin-bottom: 8px;
            border: 1px solid #ccc;
            padding: 6px;
            background: #fefefe;
            border-radius: 3px;
        }
        .laudo-procedimento .secao-titulo {
            font-weight: bold;
            font-size: 9pt;
            margin-bottom: 5px;
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .laudo-procedimento .campo-linha {
            margin-bottom: 4px;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .laudo-procedimento .campo-linha label {
            font-weight: bold;
            font-size: 8pt;
            min-width: 220px;
        }
        .laudo-procedimento .campo-linha input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 8pt;
            font-weight: bold;
            background: transparent;
        }
        .laudo-procedimento .campo-linha-full {
            margin-bottom: 4px;
        }
        .laudo-procedimento .campo-linha-full label {
            font-weight: bold;
            font-size: 8pt;
            display: block;
            margin-bottom: 2px;
        }
        .laudo-procedimento .campo-linha-full textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 8pt;
            font-weight: bold;
            background: transparent;
            min-height: 35px;
            max-height: 50px;
        }
        .laudo-procedimento .assinatura-area {
            margin-top: 10px;
            text-align: center;
        }
        .laudo-procedimento .data-area {
            margin-top: 8px;
            text-align: right;
        }
        .laudo-procedimento .data-area input {
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            padding: 2px 0;
            font-size: 8pt;
            font-weight: bold;
            background: transparent;
            width: auto;
            min-width: 180px;
            text-align: center;
        }

        /* IMPRESSÃO */
        @media print {
            .toolbar, .no-print, .btn-group, .btn, select, #printBtn {
                display: none !important;
            }
            .sheet {
                box-shadow: none;
                padding: 0;
                max-width: 100%;
                margin: 0;
            }
            .single-way {
                min-height: 27cm;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
            }
            input, textarea {
                border: 1px solid #aaa !important;
                background: white !important;
            }
            .print-hide-text {
                display: none !important;
            }
            .print-show-line {
                display: block !important;
            }
            .laudo-procedimento input, 
            .laudo-procedimento textarea {
                border-bottom: 1px solid #000 !important;
            }
            .laudo-procedimento .secao {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
<div class="sheet">
    <div class="toolbar no-print">
        <div class="btn-group">
            <select id="unidadeSelect">
                <option value="AME">AMBULATÓRIO DE ESPECIALIDADES - AME</option>
                <option value="CAPS">CAPS AD III REGIONAL VALE DO MAMANGUAPE</option>
                <option value="MAISVIDA">MAIS VIDA - SERVIÇOS MÉDICOS</option>
            </select>
            <select id="docSelector">
                <option value="controleEspecial">📋 Controle Especial</option>
                <option value="prescricao">💊 Prescrição Médica</option>
                <option value="receitaSimples">📄 Receituário</option>
                <option value="laudo">📑 Laudo Médico</option>
                <option value="exames">🔬 Solicitação de Exames</option>
                <option value="evolucao">📝 Evolução Clínica</option>
                <option value="atestado">📋 Atestado Médico</option>
                <option value="maisvida">🏥 Mais Vida - Receituário Médico</option>
                <option value="maisvidaPrescricao">🏥 Mais Vida - Solicitação de Exames</option>
                <option value="maisvidaAtestado">📋 Mais Vida - Atestado Médico</option>
                <option value="nicotina7mg">🚬 Nicotina Adesivo 7mg</option>
                <option value="nicotina14mg">🚬 Nicotina Adesivo 14mg</option>
                <option value="nicotina21mg">🚬 Nicotina Adesivo 21mg</option>
                <option value="laudoProcedimento">📄 Laudo para Solicitação de Procedimento</option>
            </select>
            <button id="printBtn" class="btn btn-primary">🖨️ IMPRIMIR</button>
        </div>
    </div>
    <div id="documentoRender" class="documento"></div>
</div>

<script>
    let currentDoc = "laudo";
    let currentUnidade = "CAPS";

    const docContainer = document.getElementById("documentoRender");
    const unidadeSelect = document.getElementById("unidadeSelect");
    const docSelector = document.getElementById("docSelector");
    const printBtn = document.getElementById("printBtn");

    function getDataAtual() {
        const hoje = new Date();
        const dia = String(hoje.getDate()).padStart(2, '0');
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const ano = hoje.getFullYear();
        const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
        return {
            dataNumerica: `${dia}/${mes}/${ano}`,
            dataExtenso: `${dia} de ${meses[hoje.getMonth()]} de ${ano}`,
            dia: parseInt(dia),
            mesExtenso: meses[hoje.getMonth()],
            mesNumero: mes,
            ano: ano,
            cidade: "JOÃO PESSOA",
            crm: "CRM-PB"
        };
    }

    function getAssinaturaComponent(texto) {
        return `
            <div class="assinatura-container">
                <div class="print-hide-text" style="font-size:9pt; font-weight:bold; text-align:center;">${texto}</div>
                <div class="print-show-line" style="text-align:center; margin-top:2px;">
                    <div style="display:inline-block; width:60%; border-bottom:1px solid #000;"></div>
                </div>
            </div>
        `;
    }

    function renderHeaderVia() {
        let unidadeNome = "";
        let logoSrc = "img/imagem1.png";
        
        if (currentUnidade === "AME") {
            unidadeNome = "AMBULATÓRIO DE ESPECIALIDADES - AME";
        } else if (currentUnidade === "CAPS") {
            unidadeNome = "CAPS AD III REGIONAL VALE DO MAMANGUAPE";
        } else {
            unidadeNome = "MAIS VIDA - SERVIÇOS MÉDICOS EIRELLI";
        }
        
        if (currentUnidade === "MAISVIDA") {
            return `
                <div class="header-via" style="border-bottom: none;">
                    <div class="logo-area-via">
                        <div class="pref-text-via" style="text-align: center; width: 100%;">
                            <div class="pref-name-via" style="font-size: 0.9rem;">MAIS VIDA</div>
                            <div class="secretaria-via" style="font-size: 0.7rem;">SERVIÇOS MÉDICOS EIRELLI</div>
                        </div>
                    </div>
                    <hr />
                </div>
            `;
        }
        
        return `
            <div class="header-via">
                <div class="logo-area-via">
                    <img src="${logoSrc}" class="logo-img-via" alt="Logo Prefeitura" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="placeholder-logo-via" style="display:none;">🏥</div>
                    <div class="pref-text-via">
                        <div class="pref-name-via">PREFEITURA MUNICIPAL DE MAMANGUAPE</div>
                        <div class="secretaria-via">SECRETARIA MUNICIPAL DE SAÚDE</div>
                        <div class="cnpj-via">CNPJ: 08.674.396/0001-64</div>
                    </div>
                </div>
                <div class="unidade-via">${unidadeNome}</div>
                <hr />
            </div>
        `;
    }

    function getEnderecoPorUnidade() {
        if (currentUnidade === "MAISVIDA") {
            return "Rua Professor Arnaldo de Berros Barro Moreira nº 193, Mangabeira - João Pessoa - PB CEP 58055-620 - Telefone (83) 98731-7608";
        } else {
            return "Rua Fábio Barbosa Vaz, Campo, Mamanguape – PB, CEP: 58.280-000 - capsad3mamanguape@outlook.com";
        }
    }

    function getNomeUnidade() {
        if (currentUnidade === "AME") {
            return "AMBULATÓRIO DE ESPECIALIDADES - AME";
        } else if (currentUnidade === "CAPS") {
            return "CAPS AD III REGIONAL VALE DO MAMANGUAPE";
        } else {
            return "MAIS VIDA - SERVIÇOS MÉDICOS EIRELLI";
        }
    }

    // ======================= CONTROLE ESPECIAL =======================
    function renderControleEspecial() {
        const data = getDataAtual();
        const headerVia = renderHeaderVia();
        const titulo = "RECEITUÁRIO DE CONTROLE ESPECIAL";
        
        const compradorFornecedorHTML = (suffix) => `
            <div class="comprador-fornecedor">
                <div class="card-comprador">
                    <div class="card-title">IDENTIFICAÇÃO DO COMPRADOR</div>
                    <div class="campo"><label>Nome:</label><input type="text" id="comp_nome_${suffix}"></div>
                    <div class="campo-inline"><div class="campo"><label>Identificação:</label><input type="text" id="comp_ident_${suffix}"></div><div class="campo"><label>Órgão Emissor:</label><input type="text" id="comp_orgao_${suffix}"></div></div>
                    <div class="campo"><label>Endereço:</label><input type="text" id="comp_end_${suffix}"></div>
                    <div class="campo-inline"><div class="campo"><label>Cidade:</label><input type="text" id="comp_cidade_${suffix}"></div><div class="campo"><label>UF:</label><input type="text" id="comp_uf_${suffix}" style="width:35px"></div><div class="campo"><label>Telefone:</label><input type="text" id="comp_tel_${suffix}"></div></div>
                </div>

                        <div class="maisvida-data"><p>JOÃO PESSOA, ${data.dia} de ${data.mesExtenso} de ${data.ano}.</p></div>
                        <div class="maisvida-assinatura">
                            <div class="assinatura-linha"></div>
                            <p><strong>Dra. Gisele Lima</strong></p>
                            <p>${data.crm} 13564</p>
                        </div>
                        <div class="maisvida-endereco"><p>Rua Professor Arnaldo de Berros Barro Moreira nº 193, Mangabeira - JP - PB</p></div>
                    </div>
                </div>
            </div>
        `;
        docContainer.innerHTML = html;
    }

    // ======================= RECEITA NICOTINA =======================
    function renderNicotina7mg() { renderTemplateNicotina("07"); }
    function renderNicotina14mg() { renderTemplateNicotina("14"); }
    function renderNicotina21mg() { renderTemplateNicotina("21"); }
    
    function renderTemplateNicotina(dosagem) {
        const data = getDataAtual();
        const endereco = getEnderecoPorUnidade();
        const headerVia = renderHeaderVia();
        
        const viaContent = (viaNome, suffix) => `
            <div class="way">
                ${headerVia}
                <div class="doc-title-via">RECEITUÁRIO</div>
                <div class="way-title">${viaNome}</div>
                <div class="paciente-linha"><label>PACIENTE:</label><input type="text" id="paciente_nicotina${dosagem}_${suffix}" placeholder="________"></div>
                <div class="medicamento"><p><strong>1. Nicotina Adesivo Transdérmico ${dosagem}mg</strong> ______ 30Un</p><p>Aplicar 01 adesivo pela manhã, em pele limpa e seca, trocar o local diariamente, por 04 semanas</p></div>
                <div class="orientacoes"><p><strong>ORIENTAÇÕES:</strong></p><p>- Não fumar durante o uso</p><p>- Retirar à noite se houver insônia</p><p>- Não cortar o adesivo</p></div>
                <div class="assinatura"><div class="linha"></div><div class="data"><p>Data: <input type="text" id="data_nicotina${dosagem}_${suffix}" value="${data.dataExtenso}" style="display:inline-block; width:auto; min-width:180px;"></p></div></div>
                <div class="rodape"><p>RECEITUÁRIO – ${getNomeUnidade()}</p><p>${endereco.substring(0, 80)}</p></div>
            </div>
        `;
        
        docContainer.innerHTML = `<div class="two-ways receita-nicotina">${viaContent("1ª VIA", "via1")}${viaContent("2ª VIA", "via2")}</div>`;
        
        const src = document.getElementById(`paciente_nicotina${dosagem}_via1`);
        const tgt = document.getElementById(`paciente_nicotina${dosagem}_via2`);
        const srcData = document.getElementById(`data_nicotina${dosagem}_via1`);
        const tgtData = document.getElementById(`data_nicotina${dosagem}_via2`);
        if (src && tgt) src.addEventListener('input', () => tgt.value = src.value);
        if (srcData && tgtData) srcData.addEventListener('input', () => tgtData.value = srcData.value);
    }

    function renderizar() {
        switch(currentDoc) {
            case "controleEspecial": renderControleEspecial(); break;
            case "prescricao": renderPrescricao(); break;
            case "receitaSimples": renderReceitaSimples(); break;
            case "laudo": renderLaudo(); break;
            case "exames": renderSolicitacaoExames(); break;
            case "evolucao": renderEvolucao(); break;
            case "atestado": renderAtestado(); break;
            case "maisvida": renderMaisVida(); break;
            case "maisvidaPrescricao": renderMaisVidaPrescricao(); break;
            case "maisvidaAtestado": renderMaisVidaAtestado(); break;
            case "nicotina7mg": renderNicotina7mg(); break;
            case "nicotina14mg": renderNicotina14mg(); break;
            case "nicotina21mg": renderNicotina21mg(); break;
            case "laudoProcedimento": renderLaudoProcedimento(); break;
            default: renderLaudo();
        }
    }

    function handlePrint() {
        const documentosRetrato = ["evolucao", "atestado", "laudo", "maisvida", "maisvidaPrescricao", "maisvidaAtestado", "laudoProcedimento"];
        const documentosPaisagem = ["prescricao", "exames", "controleEspecial", "receitaSimples", "nicotina7mg", "nicotina14mg", "nicotina21mg"];
        
        if (documentosPaisagem.includes(currentDoc)) {
            const style = document.createElement('style');
            style.textContent = `@page { size: A4 landscape; margin: 0.3cm; }`;
            document.head.appendChild(style);
            window.print();
            style.remove();
        } else {
            const style = document.createElement('style');
            style.textContent = `@page { size: A4 portrait; margin: 0.3cm; }`;
            document.head.appendChild(style);
            window.print();
            style.remove();
        }
    }

    unidadeSelect.addEventListener("change", () => { currentUnidade = unidadeSelect.value; renderizar(); });
    docSelector.addEventListener("change", () => { currentDoc = docSelector.value; renderizar(); });
    printBtn.addEventListener("click", handlePrint);
    
    renderizar();
</script>
