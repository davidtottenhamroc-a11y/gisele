<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prontuário Médico - Prefeitura de Mamanguape</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Times New Roman', Times, serif;
        }

        .sheet {
            max-width: 1400px;
            width: 100%;
            background: white;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 10px 15px 15px 15px;
        }

        .toolbar {
            background: #f1f5f9;
            padding: 8px 15px;
            border-radius: 50px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #cbd5e1;
            font-family: 'Segoe UI', system-ui;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            background: white;
            border: 1px solid #1e3a5f;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .btn-primary {
            background: #1e3a5f;
            color: white;
        }
        .btn-primary:hover {
            background: #0f2c44;
        }
        select {
            background: white;
            border: 1px solid #94a3b8;
            padding: 5px 10px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .documento {
            font-family: 'Times New Roman', Times, serif;
        }

        .header-via {
            text-align: center;
            margin-bottom: 8px;
            border-bottom: 2px solid #0b3b2f;
            padding-bottom: 5px;
        }
        .logo-area-via {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 3px;
        }
        .logo-img-via {
            max-height: 55px;
            max-width: 75px;
            object-fit: contain;
        }
        .pref-text-via {
            line-height: 1.15;
        }
        .pref-name-via {
            font-size: 0.8rem;
            font-weight: bold;
        }
        .secretaria-via {
            font-size: 0.7rem;
            font-weight: 600;
        }
        .cnpj-via {
            font-size: 0.6rem;
            color: #2d3e50;
        }
        .unidade-via {
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 4px;
            text-transform: uppercase;
            background: #fef3c7;
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
        }

        .doc-title-via {
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            margin: 5px 0 8px 0;
            text-transform: uppercase;
        }

        .two-ways {
            display: flex;
            gap: 15px;
            flex-wrap: nowrap;
            margin: 5px 0;
        }
        .way {
            flex: 1;
            min-width: 0;
            border: 1px solid #a3b8d4;
            background: #ffffff;
            padding: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .way-title {
            background: #e9edf2;
            text-align: center;
            font-weight: bold;
            padding: 4px;
            margin-bottom: 8px;
            font-size: 0.75rem;
            border-bottom: 1px solid #b9c8e0;
        }

        .campo {
            margin-bottom: 6px;
        }
        .campo label {
            font-weight: 700;
            display: block;
            font-size: 0.65rem;
            margin-bottom: 2px;
        }
        .campo-inline {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .campo-inline .campo {
            flex: 1;
            margin-bottom: 0;
        }
        input, textarea, select {
            width: 100%;
            padding: 4px 6px;
            border: 1px solid #8f9eb2;
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.7rem;
            background: #fff;
            border-radius: 3px;
        }
        textarea {
            resize: vertical;
        }

        .exames-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px 8px;
            margin: 8px 0;
            background: #fefcf5;
            padding: 8px;
            border: 1px solid #e2e8f0;
            font-size: 0.65rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .exames-grid label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: normal;
            cursor: pointer;
        }
        .exames-grid input[type="checkbox"] {
            width: 12px;
            height: 12px;
        }

        .presc-table {
            width: 100%;
            border-collapse: collapse;
            margin: 6px 0;
        }
        .presc-table th, .presc-table td {
            border: 1px solid #1f2e44;
            padding: 4px;
            vertical-align: top;
            font-size: 0.65rem;
        }
        .presc-table th {
            background: #eef2f5;
        }

        .assinatura-container {
            margin-top: 10px;
        }
        .assinatura-container .print-hide-text {
            font-size: 0.65rem;
            font-weight: bold;
            text-align: center;
        }
        .assinatura-container .print-show-line {
            text-align: center;
            margin-top: 5px;
        }
        .assinatura-container .print-show-line div {
            display: inline-block;
            width: 80%;
            border-bottom: 1px solid #000;
        }
        .print-show-line {
            display: none;
        }

        .emitente-box {
            background: #f9fafb;
            border: 1px solid #cbd5e1;
            padding: 6px;
            margin-bottom: 10px;
            text-align: center;
        }

        .comprador-fornecedor {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .card-comprador, .card-fornecedor {
            flex: 1;
            border: 1px solid #b9c8e0;
            padding: 6px;
            background: #fefefe;
        }
        .card-title {
            background: #eef2fa;
            padding: 4px;
            margin-bottom: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            text-align: center;
        }

        .radio-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 3px;
            font-weight: normal;
            font-size: 0.65rem;
        }

        @media print {
            @page {
                size: A4 landscape;
                margin: 0.3cm;
            }
            .toolbar, .no-print, .btn-group, .btn, select, #printBtn {
                display: none !important;
            }
            .print-hide-text {
                display: none !important;
            }
            .print-show-line {
                display: block !important;
            }
            .exames-grid {
                max-height: none;
                overflow-y: visible;
            }
        }
    </style>
</head>
<body>
<div class="sheet">
    <div class="toolbar no-print">
        <div class="btn-group">
            <select id="unidadeSelect">
                <option value="AME">AMBULATÓRIO DE ESPECIALIDADES - AME</option>
                <option value="CAPS">CAPS AD III REGIONAL VALE DO MAMANGUAPE</option>
            </select>
            <select id="docSelector">
                <option value="controleEspecial">📋 Controle Especial</option>
                <option value="prescricao">💊 Prescrição Médica</option>
                <option value="receitaSimples">📄 Receita Simples</option>
                <option value="laudo">📑 Laudo Médico</option>
                <option value="exames">🔬 Solicitação de Exames</option>
                <option value="evolucao">📝 Evolução Clínica</option>
            </select>
            <button id="printBtn" class="btn btn-primary">🖨️ IMPRIMIR</button>
        </div>
    </div>
    <div id="documentoRender" class="documento"></div>
</div>

<script>
    let currentDoc = "exames";
    let currentUnidade = "AME";

    const docContainer = document.getElementById("documentoRender");
    const unidadeSelect = document.getElementById("unidadeSelect");
    const docSelector = document.getElementById("docSelector");
    const printBtn = document.getElementById("printBtn");

    function getDataAtual() {
        const hoje = new Date();
        const dia = String(hoje.getDate()).padStart(2, '0');
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const ano = hoje.getFullYear();
        return `${dia}/${mes}/${ano}`;
    }

    function getAssinaturaComponent(texto) {
        return `
            <div class="assinatura-container">
                <div class="print-hide-text" style="font-size:0.7rem; font-weight:bold; text-align:center;">${texto}</div>
                <div class="print-show-line" style="text-align:center; margin-top:5px;">
                    <div style="display:inline-block; width:80%; border-bottom:1px solid #000;"></div>
                </div>
            </div>
        `;
    }

    function renderHeaderVia() {
        const unidadeNome = currentUnidade === "AME" 
            ? "AMBULATÓRIO DE ESPECIALIDADES - AME" 
            : "CAPS AD III REGIONAL VALE DO MAMANGUAPE";
        
        // Logo fixa da pasta img/imagem1.png
        const logoSrc = "img/imagem1.png";
        
        return `
            <div class="header-via">
                <div class="logo-area-via">
                    <img src="${logoSrc}" class="logo-img-via" alt="Logo Prefeitura" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="placeholder-logo-via" style="display:none;">🏥</div>
                    <div class="pref-text-via">
                        <div class="pref-name-via">PREFEITURA MUNICIPAL DE MAMANGUAPE</div>
                        <div class="secretaria-via">SECRETARIA MUNICIPAL DE SAÚDE</div>
                        <div class="cnpj-via">CNPJ: 08.674.396/0001-64</div>
                    </div>
                </div>
                <div class="unidade-via">${unidadeNome}</div>
                <hr />
            </div>
        `;
    }

    // SOLICITAÇÃO DE EXAMES
    function renderSolicitacaoExames() {
        const dataAtual = getDataAtual();
        const headerVia = renderHeaderVia();
        const titulo = "SOLICITAÇÃO DE EXAMES LABORATORIAIS";
        
        const examesLista = [
            "Hemograma", "Coagulograma", "Tipagem Sanguínea", "Sódio e Potássio", "Ureia", "Creatinina",
            "Glicemia de Jejum", "Teste de Tolerância a Glicose", "Hemoglobina Glicada", "Colesterol Total e Frações",
            "Triglicerídios", "CPK", "Gama GT", "Bilirrubinas Total e Frações", "TGO / TGP", "Amilase / Lipase",
            "Fosfatase Alcalina", "Proteinas Totais e Frações", "Ferro, Ferritina e Transferrina", "Cálcio Total",
            "Cálcio Ionizado", "Se, Mg, P", "Ácido Úrico", "PCR", "VHS", "PSA", "FAN", "Vitamina D", "Vitamina B12",
            "Dosagem de Ácido Fólico", "Sorologia para_____", "T3 Total", "T4 Livre", "TSH Ultra.", "FSH", "LH",
            "Estradiol", "FR", "Anti CCP", "Rubéola", "Citomegalovirus", "Toxoplasm.", "Eletroforese de Proteínas",
            "Eletroforese de Hemoglobina", "EAS", "Cultura de Urina", "Clearance de Creatinina - Urina de 24h",
            "Parasitológico de Fezes", "Sangue Oculto nas Fezes"
        ];
        
        function gerarCheckboxes(suffix) {
            let grid = '<div class="exames-grid">';
            examesLista.forEach(exame => {
                grid += `<label><input type="checkbox" class="exame-cb-${suffix}"> ${exame}</label>`;
            });
            grid += '</div>';
            return grid;
        }
        
        const viaContent = (viaNome, suffix) => `
            <div class="way">
                ${headerVia}
                <div class="doc-title-via">${titulo}</div>
                <div class="way-title">${viaNome}</div>
                <div class="campo"><label>Unidade de Saúde:</label><input type="text" id="unidade_${suffix}"></div>
                <div class="campo"><label>Nº Cartão do SUS:</label><input type="text" id="sus_${suffix}"></div>
                <div class="campo"><label>Nome do Usuário:</label><input type="text" id="nome_${suffix}"></div>
                <div class="campo-inline">
                    <div class="campo"><label>Data Nasc.:</label><input type="text" id="nasc_${suffix}"></div>
                    <div class="campo"><label>Sexo:</label><div class="radio-group"><label><input type="radio" name="sexo_${suffix}" value="MAS"> MAS</label><label><input type="radio" name="sexo_${suffix}" value="FEM"> FEM</label></div></div>
                    <div class="campo"><label>Telefone:</label><input type="text" id="telefone_${suffix}"></div>
                </div>
                <div class="campo"><label>Endereço:</label><input type="text" id="endereco_${suffix}"></div>
                <div class="campo"><label>Dados Clínicos:</label><textarea rows="2" id="clinicos_${suffix}"></textarea></div>
                <div class="campo"><label>Material a Examinar:</label><input type="text" id="material_${suffix}"></div>
                ${gerarCheckboxes(suffix)}
                <div class="campo"><label>Outros exames:</label><textarea rows="2" id="outros_${suffix}"></textarea></div>
                <div class="assinatura-box">
                    <div class="campo"><label>Médico Solicitante:</label><input type="text" id="medico_${suffix}"></div>
                    <div>Data: <input type="text" id="dataExames_${suffix}" value="${dataAtual}" style="width:100px"></div>
                    ${getAssinaturaComponent("Carimbo e Assinatura")}
                </div>
            </div>
        `;
        
        docContainer.innerHTML = `<div class="two-ways">${viaContent("1ª VIA - Laboratório / Paciente", "via1")}${viaContent("2ª VIA - Prontuário / Unidade", "via2")}</div>`;
        
        const campos = ['unidade', 'sus', 'nome', 'nasc', 'telefone', 'endereco', 'clinicos', 'material', 'outros', 'medico', 'dataExames'];
        campos.forEach(campo => {
            const src = document.getElementById(`${campo}_via1`);
            const tgt = document.getElementById(`${campo}_via2`);
            if (src && tgt) src.addEventListener('input', () => { tgt.value = src.value; });
        });
        
        const radios1 = document.querySelectorAll('input[name="sexo_via1"]');
        const radios2 = document.querySelectorAll('input[name="sexo_via2"]');
        radios1.forEach(r => r.addEventListener('change', () => { radios2.forEach(r2 => { if(r2.value === r.value) r2.checked = true; }); }));
        radios2.forEach(r => r.addEventListener('change', () => { radios1.forEach(r1 => { if(r1.value === r.value) r1.checked = true; }); }));
        
        const cb1 = document.querySelectorAll('.exame-cb-via1');
        const cb2 = document.querySelectorAll('.exame-cb-via2');
        if(cb1.length === cb2.length) {
            cb1.forEach((cb, i) => cb.addEventListener('change', () => cb2[i].checked = cb.checked));
            cb2.forEach((cb, i) => cb.addEventListener('change', () => cb1[i].checked = cb.checked));
        }
    }

    // CONTROLE ESPECIAL
    function renderControleEspecial() {
        const dataAtual = getDataAtual();
        const headerVia = renderHeaderVia();
        const titulo = "RECEITUÁRIO DE CONTROLE ESPECIAL";
        
        const compradorFornecedorHTML = (suffix) => `
            <div class="comprador-fornecedor">
                <div class="card-comprador">
                    <div class="card-title">IDENTIFICAÇÃO DO COMPRADOR</div>
                    <div class="campo"><label>Nome:</label><input type="text" id="comp_nome_${suffix}"></div>
                    <div class="campo-inline"><div class="campo"><label>Identificação:</label><input type="text" id="comp_ident_${suffix}"></div><div class="campo"><label>Órgão Emissor:</label><input type="text" id="comp_orgao_${suffix}"></div></div>
                    <div class="campo"><label>Endereço:</label><input type="text" id="comp_end_${suffix}"></div>
                    <div class="campo-inline"><div class="campo"><label>Cidade:</label><input type="text" id="comp_cidade_${suffix}"></div><div class="campo"><label>UF:</label><input type="text" id="comp_uf_${suffix}" style="width:50px"></div><div class="campo"><label>Telefone:</label><input type="text" id="comp_tel_${suffix}"></div></div>
                </div>
                <div class="card-fornecedor">
                    <div class="card-title">IDENTIFICAÇÃO DO FORNECEDOR</div>
                    <div class="campo"><label>Nome / Razão Social:</label><input type="text" id="forn_nome_${suffix}"></div>
                    <div class="campo-inline"><div class="campo"><label>CNPJ:</label><input type="text" id="forn_cnpj_${suffix}"></div><div class="campo"><label>CRF:</label><input type="text" id="forn_crf_${suffix}"></div></div>
                    <div class="campo"><label>Endereço:</label><input type="text" id="forn_end_${suffix}"></div>
                    <div>Data: <input type="text" id="forn_data_${suffix}" value="${dataAtual}" style="width:90px"></div>
                </div>
            </div>
        `;
        
        const viaContent = (viaNome, suffix) => `
            <div class="way">
                ${headerVia}<div class="doc-title-via">${titulo}</div><div class="way-title">${viaNome}</div>
                <div class="emitente-box"><h4>IDENTIFICAÇÃO DO EMITENTE</h4><div><strong>PREFEITURA MUNICIPAL DE MAMANGUAPE</strong></div><div>SECRETARIA MUNICIPAL DE SAÚDE</div><div>CNPJ: 08.674.396/0001-64</div>${getAssinaturaComponent("CARIMBO E ASSINATURA DO MÉDICO(A)")}</div>
                <div class="campo"><label>Paciente:</label><input type="text" id="paciente_${suffix}"></div>
                <div class="campo"><label>Endereço:</label><input type="text" id="endereco_${suffix}"></div>
                <div class="campo"><label>Prescrição:</label><textarea rows="2" id="prescricao_${suffix}"></textarea></div>
                <div class="campo"><label>Quantidade:</label><input type="text" id="quant_${suffix}"></div>
                <div class="campo"><label>Data:</label><input type="text" id="data_${suffix}" value="${dataAtual}"></div>
                ${getAssinaturaComponent("CARIMBO E ASSINATURA DO MÉDICO(A)")}
                ${compradorFornecedorHTML(suffix)}
            </div>
        `;
        
        docContainer.innerHTML = `<div class="two-ways">${viaContent("1ª VIA - Paciente / Drogaria", "via1")}${viaContent("2ª VIA - Paciente (Retenção)", "via2")}</div>`;
        
        const textFields = ['paciente', 'endereco', 'prescricao', 'quant', 'data'];
        textFields.forEach(f => { const s = document.getElementById(`${f}_via1`), t = document.getElementById(`${f}_via2`); if(s&&t) s.addEventListener('input',()=>t.value=s.value); });
        const compFields = ['comp_nome', 'comp_ident', 'comp_orgao', 'comp_end', 'comp_cidade', 'comp_uf', 'comp_tel', 'forn_nome', 'forn_cnpj', 'forn_crf', 'forn_end', 'forn_data'];
        compFields.forEach(f => { const s = document.getElementById(`${f}_via1`), t = document.getElementById(`${f}_via2`); if(s&&t) s.addEventListener('input',()=>t.value=s.value); });
    }

    // PRESCRIÇÃO MÉDICA
    function renderPrescricao() {
        const dataAtual = getDataAtual();
        const headerVia = renderHeaderVia();
        const titulo = "PRESCRIÇÃO MÉDICA";
        
        const tabelaVia = (suffix) => {
            let rows = '';
            for (let i = 0; i < 6; i++) {
                rows += `<tr><td style="width:70%;"><textarea rows="2" placeholder="Medicamento / Via / Posologia" id="med_${suffix}_${i}"></textarea></td><td style="width:30%;"><input type="text" placeholder="__/__/____" value="${dataAtual}" id="data_${suffix}_${i}"></td></tr>`;
            }
            return `<table class="presc-table"><thead><tr><th>MEDICAMENTO / VIA / POSOLOGIA</th><th>DATA</th></tr></thead><tbody>${rows}</tbody></table>`;
        };
        
        const viaContent = (viaNome, suffix) => `
            <div class="way">
                ${headerVia}<div class="doc-title-via">${titulo}</div><div class="way-title">${viaNome}</div>
                ${tabelaVia(suffix)}
                <div class="campo"><label>Anotações:</label><textarea rows="2" id="anotacoes_${suffix}"></textarea></div>
                ${getAssinaturaComponent("Carimbo e Assinatura do Médico")}
            </div>
        `;
        
        docContainer.innerHTML = `<div class="two-ways">${viaContent("1ª VIA - Paciente / Farmácia", "via1")}${viaContent("2ª VIA - Prontuário / Unidade", "via2")}</div>`;
        
        for (let i = 0; i < 6; i++) {
            const sMed = document.getElementById(`med_via1_${i}`), tMed = document.getElementById(`med_via2_${i}`);
            const sData = document.getElementById(`data_via1_${i}`), tData = document.getElementById(`data_via2_${i}`);
            if (sMed && tMed) sMed.addEventListener('input', () => tMed.value = sMed.value);
            if (sData && tData) sData.addEventListener('input', () => tData.value = sData.value);
        }
        const sAnot = document.getElementById('anotacoes_via1'), tAnot = document.getElementById('anotacoes_via2');
        if (sAnot && tAnot) sAnot.addEventListener('input', () => tAnot.value = sAnot.value);
    }

    // RECEITA SIMPLES
    function renderReceitaSimples() {
        const dataAtual = getDataAtual();
        const headerVia = renderHeaderVia();
        const titulo = "RECEITA SIMPLES";
        
        const viaContent = (viaNome, suffix) => `
            <div class="way">
                ${headerVia}<div class="doc-title-via">${titulo}</div><div class="way-title">${viaNome}</div>
                <div class="campo"><label>Paciente:</label><input type="text" id="paciente_${suffix}"></div>
                <div class="campo"><label>Endereço:</label><input type="text" id="endereco_${suffix}"></div>
                <div class="campo"><label>Medicamento(s):</label><textarea rows="5" id="medicamento_${suffix}"></textarea></div>
                <div class="campo-inline"><div class="campo"><label>Data:</label><input type="text" id="data_${suffix}" value="${dataAtual}"></div><div class="campo"><label>Validade:</label><input type="text" id="validade_${suffix}"></div></div>
                ${getAssinaturaComponent("Carimbo e Assinatura do Médico")}
            </div>
        `;
        
        docContainer.innerHTML = `<div class="two-ways">${viaContent("1ª VIA - Paciente", "via1")}${viaContent("2ª VIA - Unidade", "via2")}</div>`;
        ['paciente', 'endereco', 'medicamento', 'data', 'validade'].forEach(f => {
            const s = document.getElementById(`${f}_via1`), t = document.getElementById(`${f}_via2`);
            if (s && t) s.addEventListener('input', () => t.value = s.value);
        });
    }

    // LAUDO MÉDICO
    function renderLaudo() {
        const dataAtual = getDataAtual();
        const headerVia = renderHeaderVia();
        const titulo = "LAUDO MÉDICO";
        
        const viaContent = (viaNome, suffix) => `
            <div class="way">
                ${headerVia}<div class="doc-title-via">${titulo}</div><div class="way-title">${viaNome}</div>
                <div class="campo"><label>Paciente:</label><input type="text" id="paciente_${suffix}"></div>
                <div class="campo"><label>Data Nascimento:</label><input type="text" id="nascimento_${suffix}"></div>
                <div class="campo"><label>CID:</label><input type="text" id="cid_${suffix}"></div>
                <div class="campo"><label>Descrição:</label><textarea rows="5" id="descricao_${suffix}"></textarea></div>
                <div class="campo"><label>Data:</label><input type="text" id="data_${suffix}" value="${dataAtual}"></div>
                ${getAssinaturaComponent("Médico Responsável / CRM")}
            </div>
        `;
        
        docContainer.innerHTML = `<div class="two-ways">${viaContent("1ª VIA - Laudo / Paciente", "via1")}${viaContent("2ª VIA - Prontuário", "via2")}</div>`;
        ['paciente', 'nascimento', 'cid', 'descricao', 'data'].forEach(f => {
            const s = document.getElementById(`${f}_via1`), t = document.getElementById(`${f}_via2`);
            if (s && t) s.addEventListener('input', () => t.value = s.value);
        });
    }

    // EVOLUÇÃO CLÍNICA
    function renderEvolucao() {
        const dataAtual = getDataAtual();
        const headerVia = renderHeaderVia();
        const titulo = "EVOLUÇÃO CLÍNICA E PSIQUIÁTRICA";
        
        const viaContent = (viaNome, suffix) => `
            <div class="way">
                ${headerVia}<div class="doc-title-via">${titulo}</div><div class="way-title">${viaNome}</div>
                <div class="campo"><label>Paciente:</label><input type="text" id="paciente_${suffix}"></div>
                <div class="campo"><label>Data:</label><input type="text" id="data_${suffix}" value="${dataAtual}"></div>
                <div class="campo"><label>Evolução:</label><textarea rows="8" id="descricao_${suffix}"></textarea></div>
                ${getAssinaturaComponent("Assinatura do Profissional")}
            </div>
        `;
        
        docContainer.innerHTML = `<div class="two-ways">${viaContent("1ª VIA - Prontuário", "via1")}${viaContent("2ª VIA - Controle", "via2")}</div>`;
        ['paciente', 'data', 'descricao'].forEach(f => {
            const s = document.getElementById(`${f}_via1`), t = document.getElementById(`${f}_via2`);
            if (s && t) s.addEventListener('input', () => t.value = s.value);
        });
    }

    function renderizar() {
        switch(currentDoc) {
            case "controleEspecial": renderControleEspecial(); break;
            case "prescricao": renderPrescricao(); break;
            case "receitaSimples": renderReceitaSimples(); break;
            case "laudo": renderLaudo(); break;
            case "exames": renderSolicitacaoExames(); break;
            case "evolucao": renderEvolucao(); break;
            default: renderSolicitacaoExames();
        }
    }

    unidadeSelect.addEventListener("change", () => { currentUnidade = unidadeSelect.value; renderizar(); });
    docSelector.addEventListener("change", () => { currentDoc = docSelector.value; renderizar(); });
    printBtn.addEventListener("click", () => window.print());
    
    renderizar();
</script>
</body>
</html>
